<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kofc Charity Pools</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  
  <script>
    // Safe Printer Helper
    window.openPrintWindow = function(content) {
      const pw = window.open('', '_blank');
      if (!pw) return;
      const head = '<head><title>Print</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" /><style>body { margin: 0; padding: 20px; font-family: sans-serif; } .no-print, button { display: none !important; } * { -webkit-print-color-adjust: exact !important; }</style><\/head>';
      pw.document.write('<!DOCTYPE html><html>' + head + '<body>' + content + '<\/body><\/html>');
      pw.document.close();
      pw.focus();
      setTimeout(() => { pw.print(); pw.close(); }, 700);
    };
  </script>
</head>

<body class="bg-gray-50 text-gray-900" style="height:100%; overflow:hidden; margin:0;">
  <!-- React mounts here -->
  <div id="root" style="height:100%; overflow:hidden;"></div>

  <!-- Vite React entry point -->
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
